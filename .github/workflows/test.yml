name: test

on:
  push:
  pull_request:

jobs:
  test:
    runs-on: ubuntu-latest
    strategy:
      fail-fast: false
      matrix:
        python-version: ["3.11", "3.12", "3.13"]
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: ${{ matrix.python-version }}
      - name: Install package
        run: python -m pip install .
      - name: Compile sources
        run: python -m compileall src bin
      - name: Run tests
        run: python -m unittest discover -s tests -v
      - name: Smoke first-time onboarding
        shell: bash
        run: |
          set -euo pipefail
          export CODEX_HOME="$(mktemp -d)"
          smoke_repo="$(mktemp -d)"
          cleanup() { rm -rf "$CODEX_HOME" "$smoke_repo"; }
          trap cleanup EXIT
          python - "$smoke_repo" <<'PY'
          import json
          import pathlib
          import sys

          repo = pathlib.Path(sys.argv[1])
          package_json = {
              "name": "autonomous-loop-smoke",
              "private": True,
              "packageManager": "npm@10.9.0",
              "scripts": {
                  "lint": "echo lint"
              },
          }
          (repo / "package.json").write_text(json.dumps(package_json, indent=2) + "\n", encoding="utf-8")
          PY
          cd "$smoke_repo"
          autonomous-loop bootstrap --force
          autonomous-loop doctor
          autonomous-loop install-repo --repo "$PWD" --force
          autonomous-loop doctor --cwd "$PWD"
